<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Futuristic Wheel Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
:root{ --main: rgb(47, 177, 8); }

/* teljes overlay */
#wheel-overlay {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    pointer-events:none;
}

/* keret */
#wheel-container {
    position: relative;
    display:flex;
    align-items:center;
    gap:100px;
    width:1050px;
    height:650px;
    background:#111;
    border:5px solid var(--main);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 40px var(--main),0 0 80px var(--main);
    pointer-events:auto;
    overflow:hidden;
}

/* részecske overlay */
#particle-overlay {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    z-index:1;
}
#particle-overlay svg { pointer-events:none; }

/* bezáró X */
#close-wheel {
    position:absolute;
    top:10px;
    right:10px;
    color:var(--main);
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    z-index:10;
}

/* kerék */
#chart {
    width:600px;
    height:600px;
    position:relative;
    z-index:5;
}

/* nyeremény */
#prize-box { width:400px; text-align:center; position:relative; z-index:5; }

#prize-box h1 {
    font-size:36px;
    color:#fff;
    text-shadow:0 0 20px var(--main),0 0 50px var(--main);
    animation:glow 1.5s infinite alternate;
}

#coupon {
    font-size:22px;
    color:#fff;
    display:none;
    cursor:pointer;
    user-select:all;
    text-shadow:0 0 15px var(--main),0 0 40px var(--main);
    animation:blink 1s infinite alternate;
}

text {
    font-family:'Oswald', sans-serif;
    font-size:24px;
    fill:#fff;
    pointer-events:none;
    text-shadow:0 0 10px var(--main);
}

#spin-button {
    fill:#111;
    stroke:var(--main);
    stroke-width:5px;
    cursor:pointer;
    filter: drop-shadow(0 0 20px var(--main));
    transition: transform 0.3s ease, filter 0.3s ease;
}

#spin-button:hover {
    transform:scale(1.25);
    filter: drop-shadow(0 0 60px var(--main));
    animation:pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); filter: drop-shadow(0 0 20px var(--main));}
    50% { transform: scale(1.15); filter: drop-shadow(0 0 60px var(--main));}
    100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--main));}
}
@keyframes glow {
    0% { text-shadow: 0 0 20px var(--main),0 0 50px var(--main);}
    50% { text-shadow: 0 0 40px var(--main),0 0 100px var(--main);}
    100% { text-shadow: 0 0 20px var(--main),0 0 50px var(--main);}
}
@keyframes blink { 0%{opacity:1;}50%{opacity:.6;}100%{opacity:1;} }
</style>
</head>
<body>

<div id="wheel-overlay">
  <div id="wheel-container">
    <div id="particle-overlay"></div>
    <div id="close-wheel">×</div>
    <div id="chart"></div>
    <div id="prize-box">
      <h1 id="prize-text"></h1>
      <div id="coupon"></div>
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v3.min.js"></script>
<script>
var MAIN = getComputedStyle(document.documentElement).getPropertyValue('--main');

var w=600,h=600,r=Math.min(w,h)/2-30,rotation=0,oldrotation=0,picked=100000,oldpick=[],data=[];

var prizes=[
  {label:"5%", prize:"Nyertél 5% kedvezményt!", code:"kupon-5", count:3},
  {label:"10%", prize:"Nyertél 10% kedvezményt!", code:"kupon-10", count:3},
  {label:"20%", prize:"Nyertél 20% kedvezményt!", code:"kupon-20", count:3},
  {label:"50%", prize:"Nyertél 50% kedvezményt!", code:"kupon-50", count:1},
  {label:"90%", prize:"Nyertél 90% kedvezményt!", code:"kupon-90", count:1},
  {label:"Nem nyert", prize:"Sajnáljuk, nem nyertél semmit!", code:"", count:3}
];

var tempData=[];
prizes.forEach(p=>{for(let i=0;i<p.count;i++) tempData.push({label:p.label, prize:p.prize, code:p.code});});

function shuffleNoAdjacent(array){
  let shuffled, valid=false;
  while(!valid){
    shuffled=array.slice().sort(()=>Math.random()-0.5);
    valid=true;
    for(let i=1;i<shuffled.length;i++) if(shuffled[i].label===shuffled[i-1].label){valid=false; break;}
  }
  return shuffled;
}

data = shuffleNoAdjacent(tempData);

var svg=d3.select('#chart').append("svg").attr("width",w).attr("height",h),
    container=svg.append("g").attr("transform","translate("+w/2+","+h/2+")"),
    vis=container.append("g"),
    pie=d3.layout.pie().sort(null).value(d=>1),
    arc=d3.svg.arc().outerRadius(r);

var arcs=vis.selectAll("g.slice").data(pie(data)).enter().append("g").attr("class","slice");

arcs.append("path").attr("d",arc)
  .attr("fill",(d,i)=>i%2==0?MAIN.trim():"#111")
  .style("stroke",MAIN.trim()).style("stroke-width",3).style("opacity",0.85);

arcs.append("text").attr("transform",d=>{
  d.innerRadius=0; d.outerRadius=r; d.angle=(d.startAngle+d.endAngle)/2;
  return "rotate("+(d.angle*180/Math.PI-90)+")translate("+(d.outerRadius-70)+")";
}).attr("text-anchor","end").text((d,i)=>data[i].label);

var centerGroup=container.append("g");
for(let i=0;i<40;i++){
  centerGroup.append("circle")
    .attr("cx",Math.random()*40-20).attr("cy",Math.random()*40-20)
    .attr("r",1+Math.random()*3)
    .style("fill",MAIN.trim()).style("opacity",0.3)
    .transition().duration(3000+Math.random()*2000)
    .attrTween("r",function(){return d3.interpolate(this.getAttribute("r"),1+Math.random()*4)})
    .each("end",function repeat(){d3.select(this).transition().duration(3000+Math.random()*2000)
      .attrTween("r",()=>d3.interpolate(this.getAttribute("r"),1+Math.random()*4))
      .each("end",repeat)});
}

var particleCount=150;
var particleSVG=d3.select("#particle-overlay").append("svg")
  .attr("width","100%").attr("height","100%").style("pointer-events","none");

var particles=[];
for(let i=0;i<particleCount;i++){
  particles.push({x:Math.random()*1050,y:Math.random()*650,radius:Math.random()*3+1,speedY:Math.random()*1+0.5,opacity:Math.random()*0.5+0.3});
}

var circles=particleSVG.selectAll("circle").data(particles).enter().append("circle")
  .attr("cx",d=>d.x).attr("cy",d=>d.y).attr("r",d=>d.radius)
  .style("fill",MAIN.trim()).style("opacity",d=>d.opacity);

function animateParticles(){
  circles.each(function(d){ d.y+=d.speedY; if(d.y>650){d.y=0; d.x=Math.random()*1050;} })
    .attr("cx",d=>d.x).attr("cy",d=>d.y);
  requestAnimationFrame(animateParticles);
}
animateParticles();

svg.append("g").attr("transform","translate("+w+","+h/2+")").append("path")
  .attr("d","M-30,0 L0,15 L0,-15 Z").style({"fill":MAIN.trim(),"opacity":0.8});

var spinCircle=container.append("circle").attr("id","spin-button").attr("cx",0).attr("cy",0).attr("r",75);
container.append("text").attr("x",0).attr("y",15).attr("text-anchor","middle").text("SPIN")
  .style({"font-weight":"bold","font-size":"36px","fill":MAIN.trim(),"text-shadow":"0 0 15px "+MAIN.trim()});

container.on("click",spin);

function spin(){
  let lastSpin=localStorage.getItem("lastSpinTime");
  let now=Date.now();
  if(lastSpin && now-parseInt(lastSpin)<60000){
    alert(`Már pörgetted! Várj még ${Math.floor((60000-(now-lastSpin))/1000)} mp-et.`);
    return;
  }
  container.on("click",null);
  var ps=360/data.length, rng=Math.floor(Math.random()*1440+360);
  rotation=Math.round(rng/ps)*ps;
  picked=Math.round(data.length-(rotation%360)/ps);
  picked=picked>=data.length?picked%data.length:picked;
  rotation+=90-Math.round(ps/2);

  vis.transition().duration(4000).ease("cubic-in-out")
    .attrTween("transform",()=>{var i=d3.interpolate(oldrotation%360,rotation);return t=>"rotate("+i(t)+")";})
    .each("end",()=>{
      document.getElementById("prize-text").textContent=data[picked].prize;
      var c=document.getElementById("coupon");
      if(data[picked].code){c.textContent=data[picked].code;c.style.display="block";} else c.style.display="none";
      oldrotation=rotation;
      container.on("click",spin);
      localStorage.setItem("lastSpinTime",now);
    });
}

document.getElementById("coupon").addEventListener("click",function(){
  if(this.textContent) navigator.clipboard.writeText(this.textContent).then(()=>alert("Kupon kód kimásolva: "+this.textContent));
});

document.getElementById("close-wheel").addEventListener("click",()=>{
  document.getElementById("wheel-overlay").style.display="none";
});
</script>
</body>
</html>
